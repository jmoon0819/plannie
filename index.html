<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>플래니 — 오늘의 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nanum+Pen+Script&family=Gaegu:wght@300;400;700&family=Black+Han+Sans&family=Gothic+A1:wght@900&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  --paper: #FAFAF8;
  --line: #E8E8E8;
  --line-dark: #CCCCCC;
  --ink: #1A1A1A;
  --ink-light: #888888;
  --ink-lighter: #BBBBBB;
  --highlight-yellow: rgba(255, 236, 120, 0.55);
  --highlight-pink: rgba(255, 182, 193, 0.5);
  --highlight-blue: rgba(173, 216, 230, 0.55);
  --highlight-green: rgba(152, 220, 170, 0.5);
  --highlight-peach: rgba(255, 200, 160, 0.5);
  --highlight-lavender: rgba(200, 182, 230, 0.45);
}

body {
  background: #EBEBEB;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* TOOLBAR */
.toolbar {
  width: 100%;
  max-width: 860px;
  background: white;
  border-radius: 14px;
  padding: 12px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  position: sticky;
  top: 12px;
  z-index: 50;
}

.toolbar-logo {
  font-size: 16px;
  font-weight: 900;
  color: #111;
  margin-right: 8px;
}

.toolbar-sep {
  width: 1px;
  height: 24px;
  background: #E5E5E5;
}

.tool-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.tool-label {
  font-size: 10px;
  font-weight: 600;
  color: #999;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-right: 2px;
}

.hl-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}

.hl-btn:hover, .hl-btn.active {
  transform: scale(1.2);
  box-shadow: 0 0 0 2px #111;
}

.hl-btn[data-color="yellow"] { background: #FFEC78; }
.hl-btn[data-color="pink"]   { background: #FFB6C1; }
.hl-btn[data-color="blue"]   { background: #ADD8E6; }
.hl-btn[data-color="green"]  { background: #98DCAA; }
.hl-btn[data-color="peach"]  { background: #FFC8A0; }
.hl-btn[data-color="lavender"] { background: #C8B6E6; }
.hl-btn[data-color="none"]   { background: white; border: 1.5px solid #ccc; }
.hl-btn[data-color="none"]::after { content: '✕'; font-size: 9px; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #999; }

.font-btn {
  padding: 5px 10px;
  border-radius: 8px;
  border: 1.5px solid #E5E5E5;
  background: white;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
  color: #444;
  transition: all 0.15s;
}

.font-btn:hover, .font-btn.active {
  border-color: #111;
  background: #111;
  color: white;
}

.sticker-toggle {
  padding: 5px 12px;
  border-radius: 8px;
  border: 1.5px solid #E5E5E5;
  background: white;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
  color: #444;
  transition: all 0.15s;
}

.sticker-toggle:hover { border-color: #111; }

.action-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-left: auto;
}

.action-btn:hover { opacity: 0.7; }

/* CHARACTER STICKERS */
.char-sticker-section { margin-bottom: 12px; }

.char-sticker-label {
  font-size: 10px;
  font-weight: 700;
  color: #BBBBBB;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 7px;
}

.char-sticker-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.char-sticker-item {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.13s, background 0.13s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 2px;
}
.char-sticker-item:hover { background: #F5F5F5; transform: scale(1.12); }
.char-sticker-item img { width: 40px; height: 40px; }
.char-sticker-item span { font-size: 9px; color: #999; font-weight: 600; }

.emoji-section-label {
  font-size: 10px;
  font-weight: 700;
  color: #BBBBBB;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 7px;
  margin-top: 4px;
}

/* STICKER PANEL */
.sticker-panel {
  width: 100%;
  max-width: 860px;
  background: white;
  border-radius: 14px;
  padding: 14px 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  display: none;
}

.sticker-panel.open { display: block; }

.sticker-panel-title {
  font-size: 11px;
  font-weight: 700;
  color: #999;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.sticker-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.sticker-item {
  font-size: 26px;
  cursor: grab;
  padding: 4px;
  border-radius: 8px;
  transition: background 0.15s, transform 0.15s;
  user-select: none;
  line-height: 1;
}

.sticker-item:hover {
  background: #F5F5F5;
  transform: scale(1.15);
}

/* PLANNER PAGE */
.planner-wrap {
  width: 100%;
  max-width: 860px;
  background: var(--paper);
  border-radius: 4px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.06);
  position: relative;
  overflow: visible;
}

.planner-page {
  padding: 36px 40px 36px 40px;
  min-height: 1100px;
  position: relative;
}

/* HEADER ROW */
.header-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: start;
  margin-bottom: 6px;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 10px;
  overflow: hidden;
}

.date-area {}

.date-meta {
  font-size: 9px;
  font-weight: 600;
  color: var(--ink-lighter);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.date-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.date-field {
  outline: none;
  border: none;
  background: transparent;
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: -0.5px;
  width: 44px;
  font-family: inherit;
}

.day-field {
  outline: none;
  border: none;
  background: transparent;
  font-size: 28px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: -1px;
  width: 68px;
  font-family: 'Gaegu', cursive;
  text-transform: uppercase;
}

.dday-area {
  text-align: right;
}

.dday-event-field {
  outline: none;
  border: none;
  background: transparent;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 1px;
  text-align: right;
  width: 100%;
  font-family: inherit;
  margin-bottom: 2px;
}

.dday-label {
  font-size: 9px;
  color: var(--ink-lighter);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.dday-num-field {
  background: transparent;
  font-size: 36px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: -2px;
  text-align: right;
  width: 100%;
  white-space: nowrap;
  line-height: 1.1;
  font-family: 'Gaegu', cursive;
}

/* COMMENT ROW */
.comment-row {
  border-bottom: 1px solid var(--line-dark);
  padding: 10px 0 8px;
  margin-bottom: 0;
}

.row-meta {
  font-size: 8px;
  font-weight: 700;
  color: var(--ink-lighter);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.comment-field {
  outline: none;
  border: none;
  background: transparent;
  font-size: 15px;
  color: var(--ink);
  width: 100%;
  font-family: 'Gaegu', cursive;
  line-height: 1.6;
  resize: none;
  height: 52px;
}

/* TOTAL TIME ROW */
.quote-row {
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--line-dark);
  padding: 9px 4px;
  background: linear-gradient(90deg, rgba(255,220,80,0.10) 0%, transparent 100%);
}
.quote-icon {
  font-size: 13px;
  color: #E8B84B;
  flex-shrink: 0;
  line-height: 1;
}
.quote-field {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 13px;
  font-family: inherit;
  color: var(--ink);
  font-style: italic;
}
.quote-field::placeholder { color: #ccc; font-style: italic; }

.total-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--line-dark);
  padding: 8px 0;
}

.total-left {
  font-size: 8px;
  font-weight: 700;
  color: var(--ink-lighter);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.total-time-field {
  outline: none;
  border: none;
  background: transparent;
  font-size: 28px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: -1px;
  text-align: right;
  font-family: 'Gaegu', cursive;
  min-width: 100px;
}

/* MAIN BODY: tasks + timetable (세로 스택) */
.body-row {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--line-dark);
}

/* TASKS AREA */
.tasks-area {
  border-bottom: 1px solid var(--line-dark);
  padding: 0;
}

.tasks-header {
  display: grid;
  grid-template-columns: 52px 76px 1fr 28px 22px;
  align-items: center;
  padding: 7px 8px 5px 0;
  border-bottom: 1px solid var(--line);
}

.col-label {
  font-size: 8px;
  font-weight: 700;
  color: var(--ink-lighter);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.col-label.center { text-align: center; }

/* task rows */
.task-list { list-style: none; }

.task-row {
  display: grid;
  grid-template-columns: 52px 76px 1fr 28px 22px;
  align-items: start;
  border-bottom: 1px solid var(--line);
  min-height: 32px;
  position: relative;
  transition: background 0.1s;
  cursor: pointer;
}

.task-row:hover { background: rgba(0,0,0,0.015); }
.task-row:hover .task-del { opacity: 1; }

/* subject cell with color dot */
.task-subject-wrap {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  padding: 8px 6px 8px 4px;
  position: relative;
}

.color-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.15);
  transition: transform 0.15s;
}
.color-dot:hover { transform: scale(1.4); }

.task-subject {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-light);
  outline: none;
  text-align: right;
  min-width: 0;
}

/* color picker popup */
.color-picker-popup {
  position: absolute;
  top: 100%;
  left: 0;
  z-index: 100;
  background: white;
  border: 1px solid var(--line-dark);
  border-radius: 10px;
  padding: 8px;
  display: grid;
  grid-template-columns: repeat(4, 18px);
  gap: 5px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}

.color-swatch {
  width: 18px; height: 18px;
  border-radius: 50%;
  cursor: pointer;
  border: 1.5px solid rgba(0,0,0,0.1);
  transition: transform 0.15s;
}
.color-swatch:hover { transform: scale(1.2); }
.color-swatch.selected { border-color: #333; border-width: 2px; }

.task-time {
  font-size: 10px;
  color: var(--ink-light);
  padding: 8px 6px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
  outline: none;
  border-left: 1px solid var(--line);
  border-right: 1px solid var(--line);
  min-height: 32px;
  letter-spacing: -0.3px;
  align-self: stretch;
  display: flex;
  align-items: flex-start;
  padding-top: 9px;
}

.task-text-field {
  outline: none;
  border: none;
  background: transparent;
  font-size: 13px;
  color: var(--ink);
  width: 100%;
  padding: 6px 8px;
  font-family: 'Gaegu', cursive;
  line-height: 1.5;
  resize: none;
  /* collapsed: 1줄만 보임 */
  height: 32px;
  overflow: hidden;
  transition: height 0.2s ease;
  cursor: pointer;
}

.task-row.expanded .task-text-field {
  height: auto;
  overflow: visible;
  cursor: text;
}

/* CHECKMARK — hand-drawn SVG stroke */
.task-check {
  width: 22px; height: 22px;
  cursor: pointer;
  flex-shrink: 0;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.task-check svg { overflow: visible; }

@keyframes draw-check {
  from { stroke-dashoffset: 20; }
  to   { stroke-dashoffset: 0; }
}

.task-del {
  width: 18px; height: 18px;
  background: none;
  color: var(--ink-lighter);
  border: none;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
  padding-top: 7px;
  align-self: start;
  line-height: 1;
}

.task-row:hover .task-del { opacity: 1; }
.task-del:hover { color: #FF6B6B !important; }

/* ADD ROW */
.add-task-row {
  display: grid;
  grid-template-columns: 52px 76px 1fr auto 22px;
  align-items: center;
  border-bottom: 1px solid var(--line);
  min-height: 34px;
}

.add-field {
  font-size: 12px;
  color: var(--ink);
  border: none;
  background: transparent;
  outline: none;
  font-family: inherit;
  padding: 6px 6px;
  width: 100%;
  height: 100%;
}
.add-field::placeholder { color: var(--ink-lighter); }
.add-field:first-child { text-align: right; font-weight: 700; color: var(--ink-light); }
.add-field:nth-child(2) { border-left: 1px solid var(--line); border-right: 1px solid var(--line); font-size: 10px; }
.add-field:nth-child(3) { font-family: 'Gaegu', cursive; font-size: 13px; }

.add-task-btn {
  font-size: 16px;
  color: var(--ink-lighter);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 8px;
  line-height: 1;
  transition: color 0.2s;
  height: 100%;
}
.add-task-btn:hover { color: var(--ink); }

/* TIMETABLE — daily, 30-min slots */
.timetable-area {
  display: flex;
  flex-direction: column;
  height: 220px;
}
.subj-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 5px 8px;
  padding: 6px 4px 4px;
  border-top: 1px solid var(--line);
  min-height: 0;
}
.subj-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-family: inherit;
  color: var(--ink-light);
}
.subj-chip-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.subj-chip-name { font-weight: 700; color: var(--ink); }
.subj-chip-time { color: var(--ink-light); }

.tt-header {
  font-size: 8px;
  font-weight: 700;
  color: var(--ink-lighter);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
  padding: 7px 0 5px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.tt-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
}
.tt-scroll::-webkit-scrollbar { display: none; }

.tt-grid {
  display: grid;
  grid-template-columns: 28px 1fr;
  position: relative;
}

.tt-time-col { display: flex; flex-direction: column; }

.tt-slot-label {
  height: 16px;
  font-size: 8px;
  color: var(--ink-lighter);
  text-align: right;
  padding-right: 4px;
  line-height: 16px;
  font-weight: 500;
  flex-shrink: 0;
}

.tt-bar-col {
  position: relative;
  border-left: 1px solid var(--line-dark);
}

.tt-slot {
  height: 16px;
  border-bottom: 1px solid var(--line);
  box-sizing: border-box;
}

.tt-slot.half { border-bottom-color: var(--line); }
.tt-slot.hour { border-bottom-color: var(--line-dark); }

/* colored blocks drawn over the grid */
.tt-block {
  position: absolute;
  left: 0; right: 0;
  border-radius: 2px;
  display: flex;
  align-items: center;
  padding: 0 4px;
  overflow: hidden;
  pointer-events: none;
}

.tt-block-label {
  font-size: 8px;
  font-weight: 700;
  color: rgba(0,0,0,0.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1;
  text-align: center;
  width: 100%;
}

/* MEMO AREA */
.memo-area {
  border-top: 1px solid var(--line-dark);
  padding: 10px 0 0;
}

.memo-header {
  font-size: 8px;
  font-weight: 700;
  color: var(--ink-lighter);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.memo-lines {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.memo-line {
  border-bottom: 1px solid var(--line);
  height: 30px;
  display: flex;
  align-items: center;
}

.memo-field {
  outline: none;
  border: none;
  background: transparent;
  font-size: 13px;
  color: var(--ink);
  width: 100%;
  padding: 4px 4px;
  font-family: 'Gaegu', cursive;
}

/* PLACED STICKERS */
.placed-sticker {
  position: absolute;
  font-size: 32px;
  cursor: move;
  user-select: none;
  z-index: 10;
  transition: filter 0.1s;
  line-height: 1;
}

.placed-sticker.selected {
  filter: drop-shadow(0 0 4px rgba(100,100,255,0.6));
}

.placed-sticker:hover .sticker-controls,
.placed-sticker.picker-open .sticker-controls,
.placed-sticker.selected .sticker-controls { display: flex; }

.sticker-controls {
  position: absolute;
  top: 4px;
  right: 4px;
  display: none;
  gap: 2px;
  z-index: 10;
}

.sticker-ctrl-btn {
  background: #111;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 9px;
  padding: 2px 4px;
  cursor: pointer;
  line-height: 1.4;
}

/* highlighted text */
.hl-yellow { background: var(--highlight-yellow); border-radius: 2px; }
.hl-pink   { background: var(--highlight-pink);   border-radius: 2px; }
.hl-blue   { background: var(--highlight-blue);   border-radius: 2px; }
.hl-green  { background: var(--highlight-green);  border-radius: 2px; }
.hl-peach  { background: var(--highlight-peach);  border-radius: 2px; }
.hl-lavender { background: var(--highlight-lavender); border-radius: 2px; }

/* font styles */
/* 폰트 적용 대상 — 사용자가 입력/확인하는 모든 칸 */
body.font-gaegu .task-text-field,
body.font-gaegu .task-subject,
body.font-gaegu .task-time,
body.font-gaegu .tt-block-label,
body.font-gaegu .add-field,
body.font-gaegu .comment-field,
body.font-gaegu .day-field,
body.font-gaegu .dday-num-field,
body.font-gaegu .dday-event-field,
body.font-gaegu .total-time-field,
body.font-gaegu .memo-field { font-family: 'Gaegu', cursive; }

body.font-nanum .task-text-field,
body.font-nanum .task-subject,
body.font-nanum .task-time,
body.font-nanum .tt-block-label,
body.font-nanum .add-field,
body.font-nanum .comment-field,
body.font-nanum .day-field,
body.font-nanum .dday-num-field,
body.font-nanum .dday-event-field,
body.font-nanum .total-time-field,
body.font-nanum .memo-field { font-family: 'Nanum Pen Script', cursive; }

body.font-sans .task-text-field,
body.font-sans .task-subject,
body.font-sans .task-time,
body.font-sans .tt-block-label,
body.font-sans .add-field,
body.font-sans .comment-field,
body.font-sans .day-field,

/* TIME PICKER POPUP */
.tpk-popup {
  position: absolute;
  top: 100%; left: 0;
  z-index: 200;
  background: white;
  border: 1px solid var(--line-dark);
  border-radius: 14px;
  padding: 14px 16px 12px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.13);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 200px;
}

.tpk-labels {
  display: flex;
  width: 100%;
  justify-content: space-around;
  font-size: 9px;
  font-weight: 700;
  color: var(--ink-lighter);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.tpk-drums-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.tpk-tilde {
  font-size: 16px;
  color: var(--ink-light);
  font-weight: 300;
  padding: 0 2px;
}

.tpk-drum-wrap {
  position: relative;
  width: 68px;
  height: 90px;
  overflow: hidden;
  border-radius: 8px;
  background: var(--gray-50, #F8F8F8);
}

.tpk-drum {
  height: 90px;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.tpk-drum::-webkit-scrollbar { display: none; }

.tpk-drum-item {
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  scroll-snap-align: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-light);
  cursor: pointer;
  transition: color 0.1s;
  letter-spacing: 0.3px;
}

/* top/bottom fade */
.tpk-drum-wrap::before,
.tpk-drum-wrap::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 30px;
  pointer-events: none;
  z-index: 1;
}
.tpk-drum-wrap::before { top: 0;    background: linear-gradient(white, transparent); }
.tpk-drum-wrap::after  { bottom: 0; background: linear-gradient(transparent, white); }

/* center highlight line */
.tpk-center-line {
  position: absolute;
  top: 30px; left: 0; right: 0;
  height: 30px;
  border-top: 1.5px solid var(--ink-lighter);
  border-bottom: 1.5px solid var(--ink-lighter);
  pointer-events: none;
  z-index: 2;
}

.tpk-ok {
  background: var(--black, #0A0A0A);
  color: white;
  border: none;
  border-radius: 100px;
  padding: 7px 24px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity 0.2s;
  width: 100%;
}
.tpk-ok:hover { opacity: 0.7; }

/* 체크 완료 하이라이트 라인 */
.task-row.done {
  position: relative;
}
.task-row.done::after {
  content: '';
  position: absolute;
  left: 4px; right: 4px;
  top: 50%;
  height: 11px;
  transform: translateY(-50%) rotate(-0.4deg);
  background: rgba(255, 220, 80, 0.45);

  pointer-events: none;
  z-index: 0;

/* CALENDAR SCREEN */
.cal-screen {
  width: 100%;

}

@keyframes fadeIn  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-8px); } }

.cal-screen.hiding { animation: fadeOut 0.18s ease forwards; }

.cal-card {
  background: white;

  box-shadow: 0 4px 24px rgba(0,0,0,0.09);

.cal-arrow {

  display: flex;
  align-items: center;
  justify-content: center;

}
.cal-arrow:hover { background: #F5F5F5; border-color: #CCC; }

.cal-dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px;
}

.cal-dow {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: #BBB;

}
.cal-dow:first-child { color: #F87171; }
.cal-dow:last-child  { color: #60A5FA; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: background 0.12s;
  gap: 3px;
}
.cal-cell:hover { background: #F5F5F5; }
.cal-cell.empty { cursor: default; }
.cal-cell.empty:hover { background: none; }

.cal-num {
  font-size: 15px;
  font-weight: 600;
  color: #222;
  line-height: 1;
}
.cal-cell.other-month .cal-num { color: #DDD; }
.cal-cell.sunday .cal-num    { color: #F87171; }
.cal-cell.saturday .cal-num  { color: #60A5FA; }

.cal-cell.today {
  background: #111;
}
.cal-cell.today .cal-num { color: white; }
.cal-cell.today:hover { background: #333; }

.cal-cell.has-data::after {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #AAAAAA;
  position: absolute;
  bottom: 4px;
}
.cal-cell.today.has-data::after { background: rgba(255,255,255,0.6); }
.cal-cell.is-dday { outline: 2px solid #FF6B6B; outline-offset: -2px; border-radius: 10px; }

@keyframes slideOutRight { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(40px); } }

/* PRINT */

<script>
// ─── INITIAL DATA ──────────────────────────────────────────────────────────
const defaultTasks = [];

// ─── HIGHLIGHT ────────────────────────────────────────────────────────────
let currentHL = 'none';

function setHighlight(color, btn) {
  currentHL = color;
  document.querySelectorAll('.hl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// apply highlight to clicked task row
document.addEventListener('click', e => {
  const row = e.target.closest('.task-row');
  if (!row) return;
  if (e.target.closest('.task-check') || e.target.closest('.task-del')) return;
  if (currentHL === 'none') {
    row.className = 'task-row';
  } else {
    row.className = `task-row hl-${currentHL}`;
  }
});

// ─── FONT ─────────────────────────────────────────────────────────────────
function setFont(font, btn) {
  document.body.className = `font-${font}`;
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ─── SUBJECT COLORS ───────────────────────────────────────────────────────
const PALETTE = [
  'rgba(173,216,230,0.7)', 'rgba(255,182,193,0.7)', 'rgba(152,220,170,0.7)',
  'rgba(255,200,160,0.7)', 'rgba(200,182,230,0.7)', 'rgba(255,236,120,0.7)',
  'rgba(180,220,210,0.7)', 'rgba(240,180,180,0.7)', 'rgba(160,200,240,0.7)',
  'rgba(220,200,170,0.7)', 'rgba(190,230,190,0.7)', 'rgba(255,210,210,0.7)',
];
// colorMap: task.colorKey → color (row마다 독립)
const colorMap = {};
let paletteIdx = 0;
// 과목 이름으로 처음 배정된 색 기억 (같은 과목 추가 시 기본값으로만 사용)
const subjDefaultColor = {};

let _ckCounter = 7;
function newColorKey() { return 'ck_' + (++_ckCounter); }

function getTaskColor(task) {
  if (!colorMap[task.colorKey]) {
    const def = task.subject && subjDefaultColor[task.subject];
    colorMap[task.colorKey] = def || PALETTE[paletteIdx % PALETTE.length];
    if (task.subject && !subjDefaultColor[task.subject]) {
      subjDefaultColor[task.subject] = colorMap[task.colorKey];
      paletteIdx++;
    } else if (!def) {
      paletteIdx++;
    }
  }
  return colorMap[task.colorKey];
}

// ─── TASKS ────────────────────────────────────────────────────────────────
let tasks = [...defaultTasks];

function makeCheckSVG(done) {
  if (!done) {
    return `<svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="7" stroke="#ccc" stroke-width="1.5"/>
    </svg>`;
  }
  return `<svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <circle cx="9" cy="9" r="7" stroke="#aaa" stroke-width="1.2"/>
    <path d="M5.5 9.2 L8 11.8 L13 6.5"
      stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="12" stroke-dashoffset="0"
      style="animation:draw-check 0.22s ease forwards"/>
  </svg>`;
}

// ─── POPUP MANAGER ────────────────────────────────────────────────────────
let openPopup = null;
function closeAllPopups() {
  if (openPopup) { openPopup.remove(); openPopup = null; }
}
document.addEventListener('click', closeAllPopups);

// ─── COLOR PICKER ─────────────────────────────────────────────────────────
function showColorPicker(e, task, dot, li) {
  e.stopPropagation();
  closeAllPopups();

  const popup = document.createElement('div');
  popup.className = 'color-picker-popup';
  popup.addEventListener('click', ev => ev.stopPropagation());

  PALETTE.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = color;
    if (colorMap[task.colorKey] === color) sw.classList.add('selected');
    sw.addEventListener('click', () => {
      colorMap[task.colorKey] = color;
      dot.style.background = color;
      li.style.borderLeft = `3px solid ${color}`;
      renderTimetable();
      closeAllPopups();
    });
    popup.appendChild(sw);
  });

  dot.parentElement.appendChild(popup);
  openPopup = popup;
}

// ─── TIME PICKER ──────────────────────────────────────────────────────────
const TIME_SLOTS = [];
for (let h = 6; h <= 23; h++) {
  TIME_SLOTS.push(`${String(h).padStart(2,'0')}:00`);
  TIME_SLOTS.push(`${String(h).padStart(2,'0')}:30`);
}
TIME_SLOTS.push('24:00');

function buildDrum(initialTime) {
  const wrap = document.createElement('div');
  wrap.className = 'tpk-drum-wrap';

  const center = document.createElement('div');
  center.className = 'tpk-center-line';
  wrap.appendChild(center);

  const drum = document.createElement('div');
  drum.className = 'tpk-drum';

  // padding items top/bottom so first/last can center
  const padTop = document.createElement('div');
  padTop.style.height = '30px';
  drum.appendChild(padTop);

  TIME_SLOTS.forEach(t => {
    const item = document.createElement('div');
    item.className = 'tpk-drum-item';
    item.textContent = t;
    item.dataset.val = t;
    drum.appendChild(item);
  });

  const padBot = document.createElement('div');
  padBot.style.height = '30px';
  drum.appendChild(padBot);

  wrap.appendChild(drum);

  // scroll to initial value
  const idx = TIME_SLOTS.indexOf(initialTime);
  if (idx >= 0) {
    requestAnimationFrame(() => { drum.scrollTop = idx * 30; });
  }

  return { wrap, drum };
}

function getDrumValue(drum) {
  const idx = Math.round(drum.scrollTop / 30);
  return TIME_SLOTS[Math.max(0, Math.min(idx, TIME_SLOTS.length - 1))];
}

function showTimePicker(e, task, timeBtn) {
  e.stopPropagation();
  closeAllPopups();

  const parts = task.time ? task.time.split('~') : ['09:00', '10:00'];
  const startVal = TIME_SLOTS.includes(parts[0]) ? parts[0] : '09:00';
  const endVal   = TIME_SLOTS.includes(parts[1]) ? parts[1] : '10:00';

  const popup = document.createElement('div');
  popup.className = 'tpk-popup';
  popup.addEventListener('click', ev => ev.stopPropagation());

  const labels = document.createElement('div');
  labels.className = 'tpk-labels';
  labels.innerHTML = '<span>시작</span><span></span><span>종료</span>';
  popup.appendChild(labels);

  const drumsRow = document.createElement('div');
  drumsRow.className = 'tpk-drums-row';

  const { wrap: sw, drum: startDrum } = buildDrum(startVal);
  const tilde = document.createElement('div');
  tilde.className = 'tpk-tilde';
  tilde.textContent = '~';
  const { wrap: ew, drum: endDrum } = buildDrum(endVal);

  drumsRow.appendChild(sw);
  drumsRow.appendChild(tilde);
  drumsRow.appendChild(ew);
  popup.appendChild(drumsRow);

  const ok = document.createElement('button');
  ok.className = 'tpk-ok';
  ok.textContent = '확인';
  ok.addEventListener('click', () => {
    const s = getDrumValue(startDrum);
    const en = getDrumValue(endDrum);
    task.time = `${s}~${en}`;
    timeBtn.textContent = task.time;
    renderTimetable();
    updateSubjSummary();
    closeAllPopups();
  });
  popup.appendChild(ok);

  timeBtn.parentElement.style.position = 'relative';
  timeBtn.parentElement.appendChild(popup);
  openPopup = popup;
}

// ─── RENDER TASKS ─────────────────────────────────────────────────────────
function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  tasks.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'task-row' + (t.done ? ' done' : '');
    const color = getTaskColor(t);
    li.style.borderLeft = `3px solid ${color}`;

    // subject wrap
    const wrap = document.createElement('div');
    wrap.className = 'task-subject-wrap';

    const dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.style.background = color;
    dot.title = '색상 변경';
    dot.addEventListener('click', e => showColorPicker(e, t, dot, li));

    const subjDiv = document.createElement('div');
    subjDiv.className = 'task-subject';
    subjDiv.contentEditable = true;
    subjDiv.textContent = t.subject;
    subjDiv.addEventListener('click', e => e.stopPropagation());
    subjDiv.addEventListener('input', () => {
      tasks[i].subject = subjDiv.textContent.trim();
      renderTimetable();
    });

    wrap.appendChild(dot);
    wrap.appendChild(subjDiv);

    // time — 버튼으로 피커 열기
    const timeBtn = document.createElement('div');
    timeBtn.className = 'task-time';
    timeBtn.textContent = t.time || '시간 설정';
    timeBtn.style.cursor = 'pointer';
    timeBtn.style.userSelect = 'none';
    timeBtn.addEventListener('click', e => showTimePicker(e, tasks[i], timeBtn));

    // task text
    const ta = document.createElement('textarea');
    ta.className = 'task-text-field';
    ta.value = t.text;
    ta.addEventListener('click', e => e.stopPropagation());
    ta.addEventListener('focus', () => {
      li.classList.add('expanded');
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
    ta.addEventListener('blur', () => {
      li.classList.remove('expanded');
      ta.style.height = '';
    });
    ta.addEventListener('input', () => {
      tasks[i].text = ta.value;
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });

    // checkmark
    const chk = document.createElement('div');
    chk.className = 'task-check';
    chk.style.paddingTop = '7px';
    chk.innerHTML = makeCheckSVG(t.done);
    chk.addEventListener('click', e => {
      e.stopPropagation();
      tasks[i].done = !tasks[i].done;
      chk.innerHTML = makeCheckSVG(tasks[i].done);
      li.classList.toggle('done', tasks[i].done);
      updateTotalTime();
    });

    // delete — 5번째 열
    const del = document.createElement('button');
    del.className = 'task-del';
    del.textContent = '×';
    del.addEventListener('click', e => {
      e.stopPropagation();
      tasks.splice(i, 1);
      renderTasks();
      updateTotalTime();
    });

    li.addEventListener('click', () => ta.focus());

    li.appendChild(wrap);
    li.appendChild(timeBtn);
    li.appendChild(ta);
    li.appendChild(chk);
    li.appendChild(del);
    list.appendChild(li);
  });

  renderTimetable();
  updateTotalTime();
}

function addTask() {
  const subj = document.getElementById('addSubject').value.trim();
  const text = document.getElementById('addTask').value.trim();
  if (!text) return;
  tasks.push({ subject: subj, time: '', text, done: false, colorKey: newColorKey() });
  renderTasks();
  document.getElementById('addSubject').value = '';
  document.getElementById('addTask').value = '';
  document.getElementById('addTask').focus();
}

function handleAddKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); addTask(); }
}

// ─── TOTAL TIME 자동계산 ───────────────────────────────────────────────────
function updateTotalTime() {
  let totalMin = 0;
  tasks.forEach(t => {
    if (!t.done) return;
    const range = parseTimeRange(t.time);
    if (!range) return;
    totalMin += (range.end - range.start) * 30;
  });
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  const emoji = totalMin === 0 ? '' : h >= 6 ? ' 🔥' : h >= 2 ? ' ☀️' : ' 🧊';
  document.getElementById('totalTime').value =
    totalMin === 0 ? '0H 00M' : `${h}H ${String(m).padStart(2,'0')}M${emoji}`;
  updateSubjSummary();
}

function updateSubjSummary() {
  const el = document.getElementById('subjSummary');
  if (!el) return;

  // 과목별 분 합산 (시간 있는 것만)
  const map = {}; // subject → { min, colorKey }
  tasks.forEach(t => {
    if (!t.subject) return;
    const range = parseTimeRange(t.time);
    if (!range) return;
    const min = (range.end - range.start) * 30;
    if (!map[t.subject]) map[t.subject] = { min: 0, colorKey: t.colorKey };
    map[t.subject].min += min;
  });

  el.innerHTML = '';
  Object.entries(map).forEach(([subj, data]) => {
    const h = Math.floor(data.min / 60);
    const m = data.min % 60;
    const timeStr = h > 0 ? `${h}H ${String(m).padStart(2,'0')}M` : `${m}M`;
    const color = colorMap[data.colorKey] || '#ccc';

    const chip = document.createElement('div');
    chip.className = 'subj-chip';
    chip.innerHTML = `<div class="subj-chip-dot" style="background:${color};"></div>`
      + `<span class="subj-chip-name">${subj}</span>`
      + `<span class="subj-chip-time">${timeStr}</span>`;
    el.appendChild(chip);
  });
}

// Tab / Enter 으로 과목 → 할일 이동
function setupAddRowKeys() {
  const subj = document.getElementById('addSubject');
  if (!subj) return;
  subj.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === 'Tab') {
      e.preventDefault();
      document.getElementById('addTask')?.focus();
    }
  });
}

// ─── TIMETABLE (daily, 30-min slots) ──────────────────────────────────────
const TT_START = 6;   // 06:00
const TT_END   = 24;  // 24:00
const SLOT_H   = 16;  // px per 30-min slot
const TOTAL_SLOTS = (TT_END - TT_START) * 2; // 36

function timeToSlot(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return (h - TT_START) * 2 + (m >= 30 ? 1 : 0);
}

function parseTimeRange(str) {
  if (!str) return null;
  const m = str.match(/(\d{1,2}:\d{2})\s*[~\-]\s*(\d{1,2}:\d{2})/);
  if (!m) return null;
  const s = timeToSlot(m[1]);
  const e = timeToSlot(m[2]);
  if (isNaN(s) || isNaN(e) || e <= s || s < 0 || e > TOTAL_SLOTS) return null;
  return { start: s, end: e };
}

function buildTimetable() {
  const timeCol = document.getElementById('ttTimeCol');
  const barCol  = document.getElementById('ttBarCol');
  timeCol.innerHTML = '';
  barCol.innerHTML  = '';

  for (let slot = 0; slot < TOTAL_SLOTS; slot++) {
    // time label — only on the hour (every 2 slots)
    const label = document.createElement('div');
    label.className = 'tt-slot-label';
    if (slot % 2 === 0) {
      const h = TT_START + slot / 2;
      label.textContent = h < 10 ? '0' + h : String(h);
    }
    timeCol.appendChild(label);

    // slot line
    const slotEl = document.createElement('div');
    slotEl.className = 'tt-slot ' + (slot % 2 === 1 ? 'half' : 'hour');
    barCol.appendChild(slotEl);
  }
}

function renderTimetable() {
  // remove existing blocks
  document.querySelectorAll('.tt-block').forEach(b => b.remove());
  const barCol = document.getElementById('ttBarCol');
  if (!barCol) return;

  tasks.forEach(t => {
    const range = parseTimeRange(t.time);
    if (!range) return;
    const color = getTaskColor(t);
    const block = document.createElement('div');
    block.className = 'tt-block';
    block.style.top    = (range.start * SLOT_H) + 'px';
    block.style.height = ((range.end - range.start) * SLOT_H - 1) + 'px';
    block.style.background = color;
    const lbl = document.createElement('div');
    lbl.className = 'tt-block-label';
    lbl.textContent = t.subject || t.text;
    const blockH = (range.end - range.start) * SLOT_H;
    const fs = Math.min(16, Math.max(8, Math.floor(blockH * 0.55)));
    lbl.style.fontSize = fs + 'px';
    block.appendChild(lbl);
    barCol.appendChild(block);
  });
}


// ─── MEMO LINES ───────────────────────────────────────────────────────────
function buildMemo() {
  const el = document.getElementById('memoLines');
  for (let i = 0; i < 4; i++) {
    const line = document.createElement('div');
    line.className = 'memo-line';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'memo-field';
    inp.placeholder = i === 0 ? '메모...' : '';
    line.appendChild(inp);
    el.appendChild(line);
  }
}

// ─── CHARACTER STICKERS (코카스파니엘) ───────────────────────────────────

function setTheme(name, btn) {
  const t = THEMES[name];
  if (!t) return;
  const r = document.documentElement.style;
  r.setProperty('--paper', t.paper);
  r.setProperty('--line', t.line);
  r.setProperty('--line-dark', t.lineDark);
  r.setProperty('--ink', t.ink);
  r.setProperty('--ink-light', t.inkLight);
  r.setProperty('--ink-lighter', t.inkLighter);
  document.querySelectorAll('.quote-icon').forEach(el => el.style.color = t.accent);
  if (btn) {
    btn.closest('.tool-group').querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
}

async function takeScreenshot() {
  const btn = document.querySelector('.screenshot-btn');
  const page = document.querySelector('.planner-page');
  if (!page || !window.html2canvas) return;

  btn.textContent = '⏳';
  btn.disabled = true;
  const panel = document.getElementById('stickerPanel');
  const panelWas = panel.style.display;
  panel.style.display = 'none';

  try {
    const canvas = await html2canvas(page, {
      backgroundColor: '#FAFAF8', scale: 2,
      useCORS: true, allowTaint: true,
      scrollX: 0, scrollY: -window.scrollY,
    });
    showShareModal(canvas);
  } catch(e) {
    alert('캡처 실패: ' + e.message);
  } finally {
    panel.style.display = panelWas;
    btn.textContent = '📸 공유하기';
    btn.disabled = false;
  }
}

function showShareModal(plannerCanvas) {
  const modal = document.getElementById('shareModal');
  const preview = document.getElementById('sharePreview');
  const dateStr = dateKey(currentDate).replace(/-/g, '');

  // 기본형 미리보기

  modal.style.display = 'flex';
  modal._plannerCanvas = plannerCanvas;
  modal._dateStr = dateStr;
}

function closeShareModal() {

}

function downloadShare(mode) {
  const modal = document.getElementById('shareModal');
  const canvas = modal._plannerCanvas;
  const dateStr = modal._dateStr;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

  let finalCanvas = canvas;

  if (mode === 'story') {
    // 9:16 스토리 캔버스 (1080×1920)
    const sc = document.createElement('canvas');
    sc.width = 1080; sc.height = 1920;
    const ctx = sc.getContext('2d');

    // 배경: 크림색 그라디언트
    const grad = ctx.createLinearGradient(0, 0, 0, 1920);
    grad.addColorStop(0, '#FFF9F0');
    grad.addColorStop(1, '#F5EDE0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1080, 1920);

    // 플래너 이미지 중앙 배치 (여백 남김)
    const maxW = 980, maxH = 1600;
    const scale = Math.min(maxW / canvas.width, maxH / canvas.height);
    const w = canvas.width * scale, h = canvas.height * scale;
    const x = (1080 - w) / 2, y = (1920 - h) / 2 - 60;

    // 그림자 효과
    ctx.shadowColor = 'rgba(0,0,0,0.18)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetY = 10;
    ctx.drawImage(canvas, x, y, w, h);
    ctx.shadowColor = 'transparent';

    // 하단 로고
    ctx.font = 'bold 52px serif';
    ctx.fillStyle = '#B8956A';
    ctx.textAlign = 'center';
    ctx.fillText('plannie', 540, 1860);

    finalCanvas = sc;
  }

  const dataUrl = finalCanvas.toDataURL('image/png');
  if (isIOS) {
    const win = window.open();
    win.document.write(`<img src="${dataUrl}" style="max-width:100%;"/><p style="text-align:center;font-family:sans-serif;color:#888;margin-top:12px;">이미지를 꾹 눌러 "사진에 저장" 하세요</p>`);
  } else {
    const a = document.createElement('a');
    a.download = `plannie_${mode}_${dateStr}.png`;
    a.href = dataUrl;
    a.click();
  }
  closeShareModal();
}

function svgToDataUrl(svgStr) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

function buildStickerPanel() {
  const grid = document.getElementById('stickerGrid');

  // 캐릭터 스티커 섹션
  const charSection = document.createElement('div');
  charSection.className = 'char-sticker-section';
  const charLabel = document.createElement('div');
  charLabel.className = 'char-sticker-label';
  charLabel.textContent = '내 캐릭터';
  const charRow = document.createElement('div');
  charRow.className = 'char-sticker-row';

  CHAR_STICKERS.forEach(c => {
    const item = document.createElement('div');
    item.className = 'char-sticker-item';
    const img = document.createElement('img');
    img.src = svgToDataUrl(c.svg);
    img.draggable = false;
    const lbl = document.createElement('span');
    lbl.textContent = c.label;
    item.appendChild(img);
    item.appendChild(lbl);
    item.addEventListener('click', () => {
      placePhoto(svgToDataUrl(c.svg));
    });
    charRow.appendChild(item);
  });

  charSection.appendChild(charLabel);
  charSection.appendChild(charRow);
  grid.appendChild(charSection);

  // 구분선
  const sep = document.createElement('div');
  sep.className = 'emoji-section-label';
  sep.textContent = '이모지';
  grid.appendChild(sep);

  // 기존 이모지 스티커
  const emojiRow = document.createElement('div');
  emojiRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;';

    btn.className = 'sticker-item';
    btn.textContent = s;
    btn.draggable = true;
    btn.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', s); });
    btn.addEventListener('click', () => placeSticker(s, 60 + Math.random()*600, 100 + Math.random()*700));
    emojiRow.appendChild(btn);

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => placePhoto(ev.target.result);
  reader.readAsDataURL(file);
  e.target.value = ''; // 같은 파일 재업로드 허용
}

function placePhoto(src) {
  const el = document.createElement('div');
  el.className = 'placed-sticker placed-photo';
  el.style.left = '80px';
  el.style.top  = '120px';
  el.style.width = '120px';

  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'width:100%; border-radius:6px; display:block; pointer-events:none; user-select:none;';
  el.appendChild(img);

  const FRAMES = [
    { label:'없음',      icon:'▭', fn(e,i){ resetFrame(e,i); i.style.borderRadius='6px'; } },
    { label:'둥글게',    icon:'▢', fn(e,i){ resetFrame(e,i); i.style.borderRadius='22px'; } },
    { label:'원형',      icon:'○', fn(e,i){ resetFrame(e,i); i.style.borderRadius='50%'; } },
    { label:'폴라로이드', icon:'📷', fn(e,i){ resetFrame(e,i); e.style.background='#fff'; e.style.padding='8px 8px 26px'; e.style.boxShadow='0 3px 10px rgba(0,0,0,0.22)'; e.style.borderRadius='2px'; i.style.borderRadius='2px'; } },
    { label:'검은 테',   icon:'■', fn(e,i){ resetFrame(e,i); e.style.border='3px solid #1a1a1a'; e.style.borderRadius='6px'; i.style.borderRadius='4px'; } },
    { label:'점선',      icon:'⊡', fn(e,i){ resetFrame(e,i); e.style.border='2px dashed #999'; e.style.padding='3px'; e.style.borderRadius='6px'; i.style.borderRadius='4px'; } },
    { label:'그림자',    icon:'◫', fn(e,i){ resetFrame(e,i); e.style.boxShadow='0 8px 24px rgba(0,0,0,0.32)'; e.style.borderRadius='10px'; i.style.borderRadius='10px'; } },
    { label:'핑크',      icon:'🌸', fn(e,i){ resetFrame(e,i); e.style.border='4px solid #FFB6C1'; e.style.borderRadius='10px'; i.style.borderRadius='8px'; } },
    { label:'라벤더',    icon:'💜', fn(e,i){ resetFrame(e,i); e.style.border='4px solid #C8B6E6'; e.style.borderRadius='10px'; i.style.borderRadius='8px'; } },
    { label:'빈티지',    icon:'🟫', fn(e,i){ resetFrame(e,i); e.style.border='6px solid #D4B896'; e.style.boxShadow='inset 0 0 0 1px #B89A72, 0 2px 8px rgba(0,0,0,0.2)'; e.style.borderRadius='3px'; i.style.borderRadius='2px'; } },
  ];

  function resetFrame(e, i) {
    e.style.border = 'none';
    e.style.boxShadow = 'none';
    e.style.background = 'none';
    e.style.padding = '0';
    e.style.borderRadius = '0';
    i.style.borderRadius = '6px';
  }

  // picker를 body에 붙여서 overflow/transform 문제 방지
  const picker = document.createElement('div');
  picker.style.cssText = 'display:none;position:fixed;background:white;border-radius:14px;box-shadow:0 6px 28px rgba(0,0,0,0.22);padding:10px;z-index:9999;gap:6px;flex-wrap:wrap;width:210px;';
  FRAMES.forEach(f => {
    const btn = document.createElement('button');
    btn.style.cssText = 'font-size:13px;padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:8px;background:white;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap;';
    btn.innerHTML = `<span>${f.icon}</span><span>${f.label}</span>`;
    btn.addEventListener('touchend', ev => { ev.preventDefault(); ev.stopPropagation(); f.fn(el, img); closePicker(); });
    btn.onclick = ev => { ev.stopPropagation(); f.fn(el, img); closePicker(); };
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);

  function openPicker() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    picker.style.display = 'flex';
    picker.style.left = Math.max(8, (vw - 210) / 2) + 'px';
    picker.style.top  = (vh * 0.55) + 'px';
    el.classList.add('picker-open');
  }
  function closePicker() {
    picker.style.display = 'none';
    el.classList.remove('picker-open');
  }

  let rotation = 0;

  const ctrl = document.createElement('div');
  ctrl.className = 'sticker-controls';

  function mkBtn(text, bg, action) {
    const b = document.createElement('button');
    b.className = 'sticker-ctrl-btn';
    b.textContent = text;
    if (bg) b.style.background = bg;
    b.addEventListener('touchend', ev => { ev.preventDefault(); ev.stopPropagation(); action(); });
    b.onclick = ev => { ev.stopPropagation(); action(); };
    return b;
  }

  ctrl.appendChild(mkBtn('+', null, () => { el.style.width = (el.offsetWidth + 20) + 'px'; }));
  ctrl.appendChild(mkBtn('–', null, () => { el.style.width = Math.max(40, el.offsetWidth - 20) + 'px'; }));
  ctrl.appendChild(mkBtn('↻', null, () => { rotation = (rotation + 15) % 360; el.style.transform = `rotate(${rotation}deg)`; }));

  const frameBtn = document.createElement('button');
  frameBtn.className = 'sticker-ctrl-btn';
  frameBtn.textContent = '▭';
  frameBtn.addEventListener('touchend', ev => { ev.preventDefault(); ev.stopPropagation(); picker.style.display === 'flex' ? closePicker() : openPicker(); });
  frameBtn.onclick = ev => { ev.stopPropagation(); picker.style.display === 'flex' ? closePicker() : openPicker(); };
  ctrl.appendChild(frameBtn);

  ctrl.appendChild(mkBtn('↑', null, () => { el.style.zIndex = (parseInt(el.style.zIndex)||10) + 1; }));
  ctrl.appendChild(mkBtn('↓', null, () => { el.style.zIndex = Math.max(1, (parseInt(el.style.zIndex)||10) - 1); }));
  ctrl.appendChild(mkBtn('⧉', null, () => { placePhoto(src); }));

  const del = mkBtn('✕', '#FF6B6B', () => { picker.remove(); el.remove(); });
  ctrl.appendChild(del);

  el.appendChild(ctrl);

  // 탭으로 selected 토글 (touchend로 드래그와 충돌 방지)
  let touchMoved = false;
  el.addEventListener('touchstart', () => { touchMoved = false; }, { passive: true });
  el.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });
  el.addEventListener('touchend', e => {
    if (touchMoved) return;
    if (e.target.closest('.sticker-ctrl-btn')) return;
    document.querySelectorAll('.placed-sticker.selected').forEach(s => { if (s !== el) s.classList.remove('selected'); });
    el.classList.toggle('selected');
  });

  // 바깥 탭 시 닫기
  document.addEventListener('touchend', e => {
    if (!el.contains(e.target) && !picker.contains(e.target)) {
      closePicker();
      el.classList.remove('selected');
    }
  }, { passive: true });

  makeDraggable(el);
  plannerPage.appendChild(el);
}

function placeSticker(emoji, x, y) {
  const el = document.createElement('div');
  el.className = 'placed-sticker';
  el.textContent = emoji;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';

  let rot = 0;
  const ctrl = document.createElement('div');
  ctrl.className = 'sticker-controls';

  function mkSBtn(text, bg, action) {
    const b = document.createElement('button');
    b.className = 'sticker-ctrl-btn';
    b.textContent = text;
    if (bg) b.style.background = bg;
    b.addEventListener('touchend', ev => { ev.preventDefault(); ev.stopPropagation(); action(); });
    b.onclick = ev => { ev.stopPropagation(); action(); };
    return b;
  }

  ctrl.appendChild(mkSBtn('+', null, () => { el.style.fontSize = (parseInt(el.style.fontSize||32) + 6) + 'px'; }));
  ctrl.appendChild(mkSBtn('–', null, () => { el.style.fontSize = Math.max(12, (parseInt(el.style.fontSize||32) - 6)) + 'px'; }));
  ctrl.appendChild(mkSBtn('↻', null, () => { rot = (rot + 15) % 360; el.style.transform = `rotate(${rot}deg)`; }));
  ctrl.appendChild(mkSBtn('↑', null, () => { el.style.zIndex = (parseInt(el.style.zIndex)||10) + 1; }));
  ctrl.appendChild(mkSBtn('↓', null, () => { el.style.zIndex = Math.max(1, (parseInt(el.style.zIndex)||10) - 1); }));
  ctrl.appendChild(mkSBtn('⧉', null, () => { placeSticker(emoji, parseInt(el.style.left)+20, parseInt(el.style.top)+20); }));
  ctrl.appendChild(mkSBtn('✕', '#FF6B6B', () => el.remove()));
  el.appendChild(ctrl);

  makeDraggable(el);
  plannerPage.appendChild(el);
}

function makeDraggable(el) {
  let ox, oy, startX, startY;
  let pinching = false, initDist = 0, initW = 0;

  function getDist(t1, t2) {
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
  }

  // 마우스
  el.addEventListener('mousedown', e => {
    if (e.target.closest('.sticker-ctrl-btn')) return;
    e.preventDefault();
    startX = e.clientX; startY = e.clientY;
    ox = el.offsetLeft;  oy = el.offsetTop;
    const move = mv => {
      el.style.left = (ox + mv.clientX - startX) + 'px';
      el.style.top  = (oy + mv.clientY - startY) + 'px';
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });

  // 터치 (드래그 + 핀치줌)
  el.addEventListener('touchstart', e => {
    if (e.target.closest('.sticker-ctrl-btn')) return;
    if (e.touches.length === 2) {
      // 핀치 시작
      pinching = true;
      initDist = getDist(e.touches[0], e.touches[1]);
      initW = el.offsetWidth;
      e.preventDefault();
      return;
    }
    pinching = false;
    e.preventDefault();
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    ox = el.offsetLeft;  oy = el.offsetTop;
  }, { passive: false });

  el.addEventListener('touchmove', e => {
    if (e.target.closest('.sticker-ctrl-btn')) return;
    e.preventDefault();
    if (e.touches.length === 2 && pinching) {
      // 핀치줌
      const dist = getDist(e.touches[0], e.touches[1]);
      el.style.width = Math.max(40, initW * (dist / initDist)) + 'px';
      return;
    }
    if (e.touches.length === 1 && !pinching) {
      const t = e.touches[0];
      el.style.left = (ox + t.clientX - startX) + 'px';
      el.style.top  = (oy + t.clientY - startY) + 'px';
    }
  }, { passive: false });

  el.addEventListener('touchend', () => {
    if (pinching) pinching = false;
  });
}

  const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

function parseDateLocal(str) {
  // "YYYY-MM-DD" → 로컬 자정 Date (timezone 오류 방지)
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function calcDday(targetDateStr, fromDate) {
  if (!targetDateStr) return null;
  const base = fromDate ? new Date(fromDate) : new Date();
  base.setHours(0,0,0,0);
  const target = parseDateLocal(targetDateStr);
  const diff = Math.round((target - base) / 86400000);
  if (diff > 0) return `D-${diff}`;
  if (diff < 0) return `D+${Math.abs(diff)}`;
  return 'D-DAY';
}

function getMainDday() {
  const valid = ddayList.filter(item => item.name && item.date);
  if (valid.length === 0) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  // 미래 이벤트 중 가장 가까운 것, 없으면 가장 최근 과거
  const future = valid.filter(item => parseDateLocal(item.date) >= today);
  if (future.length > 0) {
    future.sort((a, b) => parseDateLocal(a.date) - parseDateLocal(b.date));
    return future[0];
  }
  valid.sort((a, b) => parseDateLocal(b.date) - parseDateLocal(a.date));
  return valid[0];
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────
let calViewDate = new Date(); // 달력에서 보여주는 년/월

function buildCalendar() {
  const y = calViewDate.getFullYear();
  const m = calViewDate.getMonth();
  const today = new Date();
  const todayKey = dateKey(today);

  document.getElementById('calTitle').innerHTML =
    `${y}년 <span id="calMonthName" style="font-size:15px;font-weight:500;color:#999;">${m+1}월</span>`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(y, m, 1).getDay(); // 0=일
  const lastDate = new Date(y, m+1, 0).getDate();
  const prevLast = new Date(y, m, 0).getDate();

  // 이전 달 빈 칸
  for (let i = 0; i < firstDay; i++) {
    const cell = makeCalCell(new Date(y, m-1, prevLast - firstDay + 1 + i), true);
    grid.appendChild(cell);
  }
  // 이번 달
  for (let d = 1; d <= lastDate; d++) {
    const cell = makeCalCell(new Date(y, m, d), false);
    grid.appendChild(cell);
  }
  // 다음 달 빈 칸 (6주 고정)
  const total = firstDay + lastDate;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remain; i++) {
    const cell = makeCalCell(new Date(y, m+1, i), true);
    grid.appendChild(cell);
  }
}

function makeCalCell(date, otherMonth) {
  const cell = document.createElement('div');
  cell.className = 'cal-cell';
  const dow = date.getDay();
  const key = dateKey(date);
  const today = new Date();

  if (otherMonth) cell.classList.add('other-month');
  if (dow === 0) cell.classList.add('sunday');
  if (dow === 6) cell.classList.add('saturday');
  if (dateKey(date) === dateKey(today)) cell.classList.add('today');
  if (dayStore[key] && dayStore[key].tasks.length > 0) cell.classList.add('has-data');

  // D-Day 뱃지
  const ddayMatch = ddayList.find(item => item.date === key);
  if (ddayMatch) cell.classList.add('is-dday');

  const num = document.createElement('div');
  num.className = 'cal-num';
  num.textContent = date.getDate();
  cell.appendChild(num);

  if (ddayMatch) {
    const badge = document.createElement('div');
    badge.className = 'cal-dday-badge';
    badge.textContent = ddayMatch.name || 'D-DAY';
    cell.appendChild(badge);
  }

  if (!otherMonth) {
    cell.onclick = () => openDayFromCalendar(date);
  }
  return cell;
}

function calMove(delta) {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + delta, 1);
  buildCalendar();
}

function calGoToday() {
  calViewDate = new Date();

}

// ─── DAY NAVIGATION ───────────────────────────────────────────────────────
const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const dayStore  = {};
let currentDate = new Date();
let ddayList = []; // [{ name:'수능', date:'2026-11-17' }, ...]

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function saveDayState() {
  const memoInputs = document.querySelectorAll('#memoLines .memo-field');
  dayStore[dateKey(currentDate)] = {
    tasks:    JSON.parse(JSON.stringify(tasks)),
    colorMap: {...colorMap},
    quote:    document.getElementById('quoteField').value,
    memos:    Array.from(memoInputs).map(i => i.value),
  };
  saveUserDayStore();
}

function applyDateToHeader(d) {
  document.getElementById('yearField').value  = d.getFullYear();
  document.getElementById('monthField').value = String(d.getMonth()+1).padStart(2,'0');
  document.getElementById('dayField').value   = String(d.getDate()).padStart(2,'0');
  document.getElementById('dowField').value   = DAY_NAMES[d.getDay()];
}

function updateNavLabels() {
  const prev = new Date(currentDate); prev.setDate(prev.getDate() - 1);
  const next = new Date(currentDate); next.setDate(next.getDate() + 1);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()} ${DAY_NAMES[d.getDay()]}`;
  document.getElementById('navLabel').textContent      = fmt(prev);
  document.getElementById('navLabelRight').textContent = fmt(next);
}

function loadDayState(d) {
  applyDateToHeader(d);
  updateNavLabels();

  const saved = dayStore[dateKey(d)];
  tasks.length = 0;
  Object.keys(colorMap).forEach(k => delete colorMap[k]);

  if (saved) {
    saved.tasks.forEach(t => tasks.push(t));
    Object.assign(colorMap, saved.colorMap);
    document.getElementById('quoteField').value = saved.quote || '';
    const memoInputs = document.querySelectorAll('#memoLines .memo-field');
    memoInputs.forEach((inp, i) => { inp.value = saved.memos[i] || ''; });
  } else {
    document.getElementById('quoteField').value = '';
    document.querySelectorAll('#memoLines .memo-field').forEach(inp => { inp.value = ''; });
  }

  // D-Day 자동 계산
  const mainDday = getMainDday();
  if (mainDday) {
    document.getElementById('ddayEvent').textContent = mainDday.name;
    document.getElementById('ddayNum').textContent   = calcDday(mainDday.date, d) || '';
  } else {
    document.getElementById('ddayEvent').textContent = '';
    document.getElementById('ddayNum').textContent   = '';
  }
  renderTasks();
  updateTotalTime();
}

function navigateDay(delta) {
  saveDayState();
  const wrap = document.getElementById('plannerWrap');
  const outClass = delta > 0 ? 'slide-out-left' : 'slide-out-right';
  const inClass  = delta > 0 ? 'slide-in-right'  : 'slide-in-left';
  wrap.classList.add(outClass);
  setTimeout(() => {
    wrap.classList.remove(outClass);
    currentDate = new Date(currentDate);
    currentDate.setDate(currentDate.getDate() + delta);
    loadDayState(currentDate);
    wrap.classList.add(inClass);
    setTimeout(() => wrap.classList.remove(inClass), 220);
  }, 180);
}

function goToday() {
  saveDayState();
  const today = new Date();
  if (dateKey(today) === dateKey(currentDate)) return;
  const delta = today > currentDate ? 1 : -1;
  const wrap = document.getElementById('plannerWrap');
  const outClass = delta > 0 ? 'slide-out-left' : 'slide-out-right';
  const inClass  = delta > 0 ? 'slide-in-right'  : 'slide-in-left';
  wrap.classList.add(outClass);
  setTimeout(() => {
    wrap.classList.remove(outClass);
    currentDate = today;
    loadDayState(currentDate);
    wrap.classList.add(inClass);
    setTimeout(() => wrap.classList.remove(inClass), 220);
  }, 180);
}
